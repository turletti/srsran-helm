{{- if .Values.sriov.enabled }}
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: benetel-dpdk-network
  namespace: {{ .Values.namespace }}
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "benetel-dpdk-network",
      "type": "sriov",
      "resourceName": "openshift.io/{{ .Values.sriov.sriovResourceName }}",
      "vlan": {{ .Values.sriov.vlan | default 0 }},
      "spoofchk": "off",
      "trust": "on",
      "ipam": {
        "type": "host-local",
        "subnet": "10.56.217.0/24",
        "rangeStart": "10.56.217.171",
        "rangeEnd": "10.56.217.191",
        "routes": [{"dst": "0.0.0.0/0"}],
        "gateway": "10.56.217.1"
      }
    }
{{- end }}
