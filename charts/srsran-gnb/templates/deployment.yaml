apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "srsran-gnb.fullname" . }}
  labels:
    {{- include "srsran-gnb.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "srsran-gnb.selectorLabels" . | nindent 6 }}
  replicas: 1
  template:
    metadata:
      labels:
        {{- include "srsran-gnb.selectorLabels" . | nindent 8 }}
      annotations:
        k8s.v1.cni.cncf.io/networks: >-
          [
            { "name": "{{ .Values.n3networkName }}", "interface": "n3", "ips": [ "{{ .Values.gnbIp }}/24" ] }
            {{- if .Values.ru }}
            ,{ "name": "ru-network", "interface": "ru1", "ips": [ "{{ .Values.ruPodIp }}/24" ] }
            {{- end }}
            {{- if .Values.sriov.enabled }}
            ,{ "name": "benetel-dpdk-network", "interface": "{{ .Values.sriov.name }}" }
            {{- end }}
          ]
    spec:
      {{- if .Values.sriov.enabled }}
      initContainers:
        - name: init-ru-sriov
          image: busybox
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "=== InitContainer: Vérification SR-IOV VF et interface ru ==="

              RETRIES=10
              SLEEP=3
              VF=""
              for i in $(seq 1 $RETRIES); do
                VF=$(env | grep PCIDEVICE_OPENSHIFT_IO_{{ .Values.sriov.sriovResourceName | upper | replace "-" "_" }} | cut -d= -f2)
                if [ -n "$VF" ]; then
                  echo "VF trouvée: $VF"
                  break
                fi
                echo "VF non trouvée, tentative $i/$RETRIES, attente $SLEEP s..."
                sleep $SLEEP
              done

              if [ -z "$VF" ]; then
                echo "Erreur: VF non exposée après $RETRIES tentatives"
                exit 1
              fi

              echo "=== Vérification périphériques /dev/vfio ==="
              ls -l /dev/vfio | grep -E "[0-9]+" || echo "Attention: /dev/vfio vide ou VF absente"

              echo "=== Création interface {{ .Values.sriov.name }} si manquante ==="
              if ! ip link show {{ .Values.sriov.name }} >/dev/null 2>&1; then
                echo "Interface {{ .Values.sriov.name }} manquante, création temporaire dummy pour debug..."
                ip link add {{ .Values.sriov.name }} type dummy
                ip link set {{ .Values.sriov.name }} up
              else
                echo "Interface {{ .Values.sriov.name }} déjà présente"
              fi
              ip link show {{ .Values.sriov.name }}
      {{- end }}
      containers:
        - name: gnb
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              ip route del default dev n3 || true

              {{- if .Values.sriov.enabled }}
              RESOLVED_CONFIG="/tmp/srsran-gnb.yaml"
              cp /srsran/config/srsran-gnb.yaml "$RESOLVED_CONFIG"

              {{- if .Values.sriov.pciAddress }}
              PCI_ADDR="{{ .Values.sriov.pciAddress }}"
              {{- else }}
              RESOURCE_VAR=$(echo "PCIDEVICE_OPENSHIFT_IO_{{ .Values.sriov.sriovResourceName }}" | tr '[:lower:]' '[:upper:]' | tr '-' '_' | tr '.' '_')
              PCI_ADDR=${!RESOURCE_VAR}

              if [ -z "$PCI_ADDR" ]; then
                PCI_ADDR=$(cat /sys/class/net/{{ .Values.sriov.name }}/device/uevent 2>/dev/null | grep PCI_SLOT_NAME | cut -d= -f2)
              fi
              {{- end }}

              if [ -z "$PCI_ADDR" ]; then
                echo "ERROR: Could not determine PCI address"
                exit 1
              fi

              PCI_ADDR=$(echo $PCI_ADDR | cut -d',' -f1)
              echo "PCI address resolved: $PCI_ADDR"

              OLD_PCI=$(grep -oP '[0-9a-f]{4}:[0-9a-f]{2}:[0-9a-f]{2}\.[0-9]' "$RESOLVED_CONFIG" | head -1)
              sed -i "s|$OLD_PCI|$PCI_ADDR|g" "$RESOLVED_CONFIG"
              CONFIG_FILE="$RESOLVED_CONFIG"
              {{- else }}
              CONFIG_FILE="/srsran/config/srsran-gnb.yaml"
              {{- end }}

              {{- if .Values.start.gnb }}
              /usr/local/bin/gnb -c $CONFIG_FILE
              {{- else }}
              sleep infinity
              {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.gnbConfig.remote_control.port }}
              protocol: TCP
          securityContext:
            privileged: true
            capabilities:
              add: ["NET_ADMIN", "SYS_NICE", "IPC_LOCK"]
          resources:
            requests:
              memory: "4Gi"
              hugepages-1Gi: "2Gi"
              {{- if .Values.sriov.enabled }}
              openshift.io/{{ .Values.sriov.sriovResourceName }}: "1"
              {{- end }}
            limits:
              memory: "4Gi"
              hugepages-1Gi: "2Gi"
              {{- if .Values.sriov.enabled }}
              openshift.io/{{ .Values.sriov.sriovResourceName }}: "1"
              {{- end }}
          volumeMounts:
            - mountPath: /srsran/config
              name: gnb-volume
            - mountPath: /var/log/
              name: varlog
            - mountPath: /mnt/
              name: host-mount
            - mountPath: /dev/hugepages
              name: hugepages

        {{- if .Values.start.logs }}
        - name: gnb-logs
          image: busybox
          args: [/bin/sh, -c, 'while ! tail -f /var/log/gnb.log 2>/dev/null; do sleep 1 ; done']
          volumeMounts:
            - mountPath: /var/log/
              name: varlog
        {{- end }}

      dnsPolicy: ClusterFirst
      restartPolicy: Always
      {{- if .Values.nodeName }}
      nodeName: {{ .Values.nodeName }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: gnb-volume
          configMap:
            name: gnb-configmap
            items:
              - key: srsran-gnb.yaml
                path: srsran-gnb.yaml
        - name: varlog
          emptyDir: {}
        - name: host-mount
          hostPath:
            path: /mnt/
            type: Directory
        - name: hugepages
          emptyDir:
            medium: HugePages-1Gi