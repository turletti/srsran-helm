apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "srsran-gnb.fullname" . }}
  labels:
    {{- include "srsran-gnb.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "srsran-gnb.selectorLabels" . | nindent 6 }}
  replicas: 1
  template:
    metadata:
      labels:
        {{- include "srsran-gnb.selectorLabels" . | nindent 8 }}
      annotations:
        k8s.v1.cni.cncf.io/networks: |
          [
            { "name": "{{ .Values.n3networkName }}", "interface": "n3", "ips": [ "{{ .Values.gnbIp }}/24" ] }
            {{- if .Values.sriov.enabled }}
            , { "name": "benetel-dpdk-network", "interface": "{{ .Values.sriov.name }}", "mac": "{{ .Values.sriov.mac }}" }
            {{- end }}
          ]
    spec:
      containers:
        - name: gnb
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              # Nettoyage de la route par défaut sur n3
              ip route del default dev n3 || true

              {{- if .Values.sriov.enabled }}
              RESOLVED_CONFIG="/tmp/srsran-gnb.yaml"
              cp /srsran/config/srsran-gnb.yaml "$RESOLVED_CONFIG"

              echo "Resolving PCI Address..."
              {{- if .Values.sriov.pciAddress }}
              PCI_ADDR="{{ .Values.sriov.pciAddress }}"
              {{- else }}
              # En mode DPDK, l'interface disparaît de /sys/class/net/. 
              # On utilise la variable d'env injectée par le SR-IOV Device Plugin.
              # Format attendu : PCIDEVICE_OPENSHIFT_IO_<RESOURCE_NAME_EN_MAJUSCULES>
              RESOURCE_VAR=$(echo "PCIDEVICE_OPENSHIFT_IO_{{ .Values.sriov.sriovResourceName }}" | tr '[:lower:]' '[:upper:]' | tr '-' '_' | tr '.' '_')
              PCI_ADDR=${!RESOURCE_VAR}

              # Fallback : Si la variable d'env est vide, on tente l'inspection sysfs (au cas où)
              if [ -z "$PCI_ADDR" ]; then
                PCI_ADDR=$(cat /sys/class/net/{{ .Values.sriov.name }}/device/uevent 2>/dev/null | grep PCI_SLOT_NAME | cut -d= -f2)
              fi
              {{- end }}

              if [ -z "$PCI_ADDR" ]; then
                echo "ERROR: Could not determine PCI address for {{ .Values.sriov.name }}. Check resource allocation."
                exit 1
              fi

              # Si plusieurs adresses sont retournées (séparées par des virgules), on prend la première
              PCI_ADDR=$(echo $PCI_ADDR | cut -d',' -f1)
              echo "PCI address resolved: $PCI_ADDR"

              # Injection de l'adresse PCI dans le fichier de config (remplace le placeholder par défaut)
              sed -i "s|0000:3a:09\.[0-3]|$PCI_ADDR|g" "$RESOLVED_CONFIG"
              CONFIG_FILE="$RESOLVED_CONFIG"
              {{- else }}
              CONFIG_FILE="/srsran/config/srsran-gnb.yaml"
              {{- end }}

              {{- if .Values.start.gnb }}
              echo "Starting gNB with config: $CONFIG_FILE"
              /usr/local/bin/gnb -c $CONFIG_FILE
              {{- else }}
              sleep infinity
              {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.gnbConfig.remote_control.port }}
              protocol: TCP
          securityContext:
            privileged: true
            capabilities:
              add: ["NET_ADMIN", "SYS_NICE", "IPC_LOCK"]
          resources:
            requests:
              memory: "4Gi"
              hugepages-1Gi: "2Gi"
              {{- if .Values.sriov.enabled }}
              openshift.io/{{ .Values.sriov.sriovResourceName }}: "1"
              {{- end }}
            limits:
              memory: "4Gi"
              hugepages-1Gi: "2Gi"
              {{- if .Values.sriov.enabled }}
              openshift.io/{{ .Values.sriov.sriovResourceName }}: "1"
              {{- end }}
          volumeMounts:
            - mountPath: /srsran/config
              name: gnb-volume
            - mountPath: /var/log/
              name: varlog
            - mountPath: /mnt/
              name: host-mount
            - mountPath: /dev/hugepages
              name: hugepages

        {{- if .Values.start.logs }}
        - name: gnb-logs
          image: busybox
          args: [/bin/sh, -c, 'while ! tail -f /var/log/gnb.log 2>/dev/null; do sleep 1 ; done']
          volumeMounts:
            - mountPath: /var/log/
              name: varlog
        {{- end }}

      dnsPolicy: ClusterFirst
      restartPolicy: Always
      {{- if .Values.nodeName }}
      nodeName: {{ .Values.nodeName }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: gnb-volume
          configMap:
            name: gnb-configmap
            items:
              - key: srsran-gnb.yaml
                path: srsran-gnb.yaml
        - name: varlog
          emptyDir: {}
        - name: host-mount
          hostPath:
            path: /mnt/
            type: Directory
        - name: hugepages
          emptyDir:
            medium: HugePages-1Gi
