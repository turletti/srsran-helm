{{- if .Values.ru }}
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: ru-network
  namespace: {{ .Values.namespace }}
spec:
  config: '{
    "cniVersion": "0.3.1",
    "type": "macvlan",
    "master": "r2lab_ru",
    "mode": "bridge",
    "mtu": 9216,
    "ipam": {
      "type": "static"
    }
  }'
{{- end }}